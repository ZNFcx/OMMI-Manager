<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>OMMI 导航</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="bgLayer"></div>
<div id="bgOverlay"></div>
<div class="container">
    <div class="header-area">
        <span class="header-icon">🧭</span>
        <div>
            <h1>OMMI</h1>
            <p class="header-subtitle">沉舟侧畔千帆过，病树前头万木春。</p>
        </div>
        <span class="header-icon">✦</span>
    </div>

    <!-- 快速入口 - 包含后台管理 -->
    <div style="display:flex;gap:1rem;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap;">
        <a href="index.html" style="background:rgba(76,175,80,0.2);padding:0.5rem 1.5rem;border-radius:30px;color:#4CAF50;text-decoration:none;font-weight:600;border:1px solid rgba(76,175,80,0.3);">
            📦 物品展示
        </a>
        <a href="admin.html" style="background:rgba(255,152,0,0.2);padding:0.5rem 1.5rem;border-radius:30px;color:#FF9800;text-decoration:none;font-weight:600;border:1px solid rgba(255,152,0,0.3);">
            ⚙️ 管理后台
        </a>
    </div>

    <div class="search-wrapper">
        <div class="search-tabs" id="searchTabs"></div>
        <div class="search-box">
            <button class="engine-trigger" id="engineTrigger" aria-label="切换搜索引擎">
                <img id="search-engine-icon" src="" alt="搜索引擎图标">
                <span class="engine-name" id="engineName"></span>
                <span class="engine-arrow" id="engineArrow">▾</span>
            </button>
            <div class="search-divider"></div>
            <input type="text" id="searchInput" placeholder="搜索网页 / 定位站内网站" autocomplete="off" oninput="filterLinks()">
            <button class="clear-btn" id="clearBtn" aria-label="清空" style="display:none;" onclick="clearSearch()">✕</button>
            <button class="search-submit-btn" onclick="doSearch()" aria-label="搜索">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </button>
        </div>
        <div class="engine-list" id="enginePanel" style="display:none;"></div>
    </div>

    <div id="main-content"></div>
</div>
<script src="main.js"></script>
</body>
</html>
